{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1B3B2F">
    <meta name="robots" content="noindex">

    <title>{% block title %}GéoBétail{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Accédez à votre espace GéoBétail.{% endblock %}">

    <link rel="icon" type="image/png" href="{% static 'img/logo1.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/design-system.css' %}">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: var(--font-family-body);
            color: var(--color-text-primary);
            background:
                radial-gradient(1200px 600px at 100% -10%, rgba(201,162,39,0.12), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(27,59,47,0.10), transparent 60%),
                var(--color-bg-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; }

        .auth-wrap { width: 100%; max-width: 440px; }

        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
            font-family: var(--font-family-heading);
            font-weight: var(--font-weight-bold);
            font-size: var(--font-size-xl);
            color: var(--color-primary-forest);
        }
        .auth-brand img { width: 38px; height: 38px; object-fit: contain; }

        .auth-card {
            background: var(--color-bg-white);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-2xl);
            padding: var(--space-8);
            box-shadow: var(--shadow-lg);
        }

        .auth-header { text-align: center; margin-bottom: var(--space-6); }
        .auth-header h1 {
            font-family: var(--font-family-heading);
            font-weight: var(--font-weight-bold);
            font-size: var(--font-size-2xl);
            color: var(--color-text-primary);
            margin-bottom: var(--space-2);
        }
        .auth-header p { color: var(--color-text-secondary); font-size: var(--font-size-sm); }

        .form-group { margin-bottom: var(--space-5); }
        .form-group label {
            display: block;
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
            color: var(--color-text-primary);
            margin-bottom: var(--space-2);
        }
        .form-group input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-sm);
            font-family: var(--font-family-body);
            background: var(--color-bg-white);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .form-group input:focus {
            border-color: var(--color-primary-forest);
            box-shadow: 0 0 0 3px rgba(27, 59, 47, 0.1);
            outline: none;
        }
        .form-group .helptext { display: block; font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-2); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-4);
            width: 100%;
            border-radius: var(--radius-lg);
            font-family: var(--font-family-heading);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-base);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            background: var(--color-primary-forest);
            color: var(--color-text-inverse);
        }
        .btn:hover { background: var(--color-primary-forest-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn:focus-visible { outline: 2px solid var(--color-accent-gold); outline-offset: 2px; }

        .alert {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-sm);
            margin-bottom: var(--space-5);
            background: var(--color-danger-light);
            color: var(--color-danger);
            border: 1px solid rgba(184, 59, 43, 0.2);
        }

        .errorlist { color: var(--color-danger); font-size: var(--font-size-xs); margin-top: var(--space-2); padding-left: var(--space-4); }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-6);
            padding-top: var(--space-6);
            border-top: 1px solid var(--color-border-light);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        .auth-footer a { color: var(--color-primary-forest); font-weight: var(--font-weight-semibold); }
        .auth-footer a:hover { text-decoration: underline; }

        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            margin-top: var(--space-5);
            width: 100%;
            justify-content: center;
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
        }
        .auth-back:hover { color: var(--color-primary-forest); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="auth-wrap">
        <a href="{% url 'animaux:accueil' %}" class="auth-brand" aria-label="Accueil GéoBétail">
            <img src="{% static 'img/logo1.png' %}" alt="logo1 GéoBétail">
            <span>GéoBétail</span>
        </a>
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
        <a href="{% url 'animaux:accueil' %}" class="auth-back">← Retour à l'accueil</a>
    </div>
</body>
</html>
